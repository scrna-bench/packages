name: Build and Publish Recipes

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      recipe:
        description: 'Specific recipe to build (leave empty for all changed)'
        required: false
        type: string

env:
  RATTLER_BUILD_VERSION: "0.31.1"

jobs:
  detect-changes:
    name: Detect Changed Recipes
    runs-on: ubuntu-latest
    outputs:
      recipes: ${{ steps.get-recipes.outputs.recipes }}
      matrix: ${{ steps.get-recipes.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed recipes
        id: get-recipes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.recipe }}" ]; then
            # Manual trigger with specific recipe
            RECIPES='["${{ inputs.recipe }}"]'
            echo "Building manually triggered recipe: ${{ inputs.recipe }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR - detect changed recipes
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^recipes/' || true)
            if [ -z "$CHANGED_FILES" ]; then
              echo "No recipe changes detected in PR"
              RECIPES='[]'
            else
              RECIPES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          else
            # Push to main - detect changed recipes
            # Check if this is an initial commit or if before SHA is valid
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || \
               [ -z "${{ github.event.before }}" ]; then
              echo "Initial push or invalid before SHA - building all recipes"
              RECIPES=$(find recipes -mindepth 1 -maxdepth 1 -type d ! -name "_*" -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^recipes/' || true)
              if [ -z "$CHANGED_FILES" ]; then
                echo "No recipe changes detected - building all recipes"
                RECIPES=$(find recipes -mindepth 1 -maxdepth 1 -type d ! -name "_*" -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
              else
                RECIPES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
              fi
            fi
          fi
          
          echo "recipes=$RECIPES" >> $GITHUB_OUTPUT
          echo "matrix={\"recipe\":$RECIPES}" >> $GITHUB_OUTPUT
          echo "Detected recipes: $RECIPES"

  build:
    name: Build (${{ matrix.platform.target }})
    needs: detect-changes
    if: needs.detect-changes.outputs.recipes != '[]'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: linux-64
          - os: macos-14  # M1/M2 — native osx-arm64
            target: osx-arm64
          - os: windows-latest
            target: win-64
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        shell: bash
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Build recipes in dependency order
        shell: bash
        run: |
          mkdir -p output

          # Explicit build order — dependencies must come before dependents.
          # Any recipe not listed here is built last, in arbitrary order.
          ORDERED=(
            "bioconductor-rhdf5lib"
            "bioconductor-rhdf5filters"
            "bioconductor-rhdf5"
            "r-anndata"
          )

          RECIPES_JSON='${{ needs.detect-changes.outputs.recipes }}'

          in_build_list() {
            echo "$RECIPES_JSON" | jq -e --arg r "$1" 'index($r) != null' > /dev/null 2>&1
          }

          # Strip carriage returns from recipe names (Windows line endings in GHA JSON)
          clean_recipe() { echo "$1" | tr -d '\r'; }

          build_recipe() {
            local recipe=$1
            echo "::group::Building $recipe"

            if grep -q "noarch:" "recipes/$recipe/recipe.yaml" && \
               [ "${{ matrix.platform.target }}" != "linux-64" ]; then
              echo "Skipping noarch recipe on ${{ matrix.platform.target }}"
              echo "::endgroup::"
              return 0
            fi

            rattler-build build \
              --recipe "recipes/$recipe/recipe.yaml" \
              --output-dir output \
              --channel "$(pwd)/output" \
              --channel https://prefix.dev/almost-conductor \
              --channel conda-forge \
              --target-platform "${{ matrix.platform.target }}"

            local status=$?
            echo "::endgroup::"
            return $status
          }

          # Build in declared order first
          BUILT=()
          for recipe in "${ORDERED[@]}"; do
            recipe=$(clean_recipe "$recipe")
            if in_build_list "$recipe"; then
              build_recipe "$recipe"
              BUILT+=("$recipe")
            fi
          done

          # Build any remaining recipes not covered by the ordered list
          for recipe in $(echo "$RECIPES_JSON" | jq -r '.[]' | tr -d '\r'); do
            skip=false
            for already in "${BUILT[@]}"; do
              [ "$already" = "$recipe" ] && skip=true && break
            done
            if [ "$skip" = "false" ]; then
              build_recipe "$recipe"
            fi
          done
        env:
          CONDA_BLD_PATH: ${{ github.workspace }}/output

      - name: List built packages
        shell: bash
        run: |
          echo "Built packages:"
          find output -name "*.conda" -o -name "*.tar.bz2" | sort

      - name: Verify packages built
        shell: bash
        run: |
          PACKAGE_COUNT=$(find output -name "*.conda" -o -name "*.tar.bz2" | wc -l)
          if [ "$PACKAGE_COUNT" -eq 0 ]; then
            echo "⚠️ No packages built (all recipes may be skipped for this platform)"
          else
            echo "✅ $PACKAGE_COUNT package(s) built successfully"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.target }}-packages
          path: output/
          retention-days: 30
          if-no-files-found: ignore

  publish:
    name: Publish to prefix.dev
    needs: build
    if: >-
      always() &&
      needs.build.result != 'cancelled' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        shell: bash
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        shell: bash
        run: |
          echo "Downloaded artifacts:"
          find artifacts/ -type f -name "*.conda" -o -name "*.tar.bz2"



      - name: Upload to prefix.dev
        shell: bash
        run: |
          echo "Uploading to prefix.dev using trusted publisher authentication..."
          echo "Channel: almost-conductor"
          
          # Find all package files
          PACKAGES=$(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \))
          
          if [ -z "$PACKAGES" ]; then
            echo "No packages found to upload"
            exit 1
          fi
          
          echo "Uploading packages to prefix.dev channel: almost-conductor"
          for PACKAGE in $PACKAGES; do
            echo "Uploading: $PACKAGE"
            if rattler-build upload prefix -c almost-conductor "$PACKAGE"; then
              echo "✅ Uploaded: $PACKAGE"
            else
              echo "⚠️ Skipped (already exists): $PACKAGE"
            fi
          done
          echo "✅ Done uploading packages"

      - name: Comment on PR (if from PR)
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'Merge pull request')
        uses: actions/github-script@v7
        with:
          script: |
            const packages = require('fs').readdirSync('artifacts/', { recursive: true })
              .filter(f => f.endsWith('.conda') || f.endsWith('.tar.bz2'));
            
            const comment = `
            ### 📦 Packages Published to prefix.dev
            
            The following packages have been built and published:
            
            ${packages.map(p => `- \`${p}\``).join('\n')}
            
            Install with:
            \`\`\`bash
            pixi add -c https://prefix.dev/almost-conductor <package-name>
            \`\`\`
            `;
            
            // This would need the PR number to post, which requires parsing commit message
            console.log(comment);
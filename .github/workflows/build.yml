name: Build and Publish Recipes

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'recipes/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'recipes/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      recipe:
        description: 'Specific recipe to build (leave empty for all changed)'
        required: false
        type: string

env:
  RATTLER_BUILD_VERSION: "0.16.0"

jobs:
  detect-changes:
    name: Detect Changed Recipes
    runs-on: ubuntu-latest
    outputs:
      recipes: ${{ steps.get-recipes.outputs.recipes }}
      matrix: ${{ steps.get-recipes.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed recipes
        id: get-recipes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.recipe }}" ]; then
            # Manual trigger with specific recipe
            RECIPES='["${{ inputs.recipe }}"]'
            echo "Building manually triggered recipe: ${{ inputs.recipe }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR - detect changed recipes
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^recipes/' || true)
            if [ -z "$CHANGED_FILES" ]; then
              echo "No recipe changes detected"
              RECIPES='[]'
            else
              RECIPES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          else
            # Push to main - detect changed recipes
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^recipes/' || true)
            if [ -z "$CHANGED_FILES" ]; then
              echo "No recipe changes detected"
              RECIPES='[]'
            else
              RECIPES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi
          
          echo "recipes=$RECIPES" >> $GITHUB_OUTPUT
          echo "matrix={\"recipe\":$RECIPES}" >> $GITHUB_OUTPUT
          echo "Detected recipes: $RECIPES"

  build:
    name: Build ${{ matrix.recipe }}
    needs: detect-changes
    if: needs.detect-changes.outputs.recipes != '[]'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest

      - name: Install rattler-build
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Verify recipe exists
        run: |
          if [ ! -f "recipes/${{ matrix.recipe }}/recipe.yaml" ]; then
            echo "Error: Recipe file not found at recipes/${{ matrix.recipe }}/recipe.yaml"
            exit 1
          fi
          echo "Found recipe at recipes/${{ matrix.recipe }}/recipe.yaml"

      - name: Build recipe
        run: |
          cd recipes/${{ matrix.recipe }}
          rattler-build build --recipe recipe.yaml --output-dir ../../output
        env:
          CONDA_BLD_PATH: ${{ github.workspace }}/output

      - name: List built packages
        run: |
          echo "Built packages:"
          ls -lh output/
          
      - name: Test installation
        run: |
          # Get the built package file
          PACKAGE_FILE=$(ls output/*.conda 2>/dev/null | head -n 1 || ls output/*.tar.bz2 2>/dev/null | head -n 1)
          
          if [ -z "$PACKAGE_FILE" ]; then
            echo "Warning: No package file found to test"
            exit 0
          fi
          
          echo "Testing package: $PACKAGE_FILE"
          
          # Create a test environment and install the package
          pixi init test-env
          cd test-env
          pixi add --manifest-path pixi.toml file://../$PACKAGE_FILE || echo "Installation test skipped (pixi add limitation)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.recipe }}-packages
          path: output/
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Publish to prefix.dev
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest

      - name: Install rattler-build
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts/ -type f -name "*.conda" -o -name "*.tar.bz2"

      - name: Upload to prefix.dev
        run: |
          # Find all package files
          PACKAGES=$(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \))
          
          if [ -z "$PACKAGES" ]; then
            echo "No packages found to upload"
            exit 1
          fi
          
          echo "Uploading packages to prefix.dev channel: almost-conductor"
          for PACKAGE in $PACKAGES; do
            echo "Uploading: $PACKAGE"
            rattler-build upload prefix -c almost-conductor "$PACKAGE"
          done
          
          echo "✅ All packages uploaded successfully!"

      - name: Comment on PR (if from PR)
        if: github.event_name == 'push' && github.event.head_commit.message contains 'Merge pull request'
        uses: actions/github-script@v7
        with:
          script: |
            const packages = require('fs').readdirSync('artifacts/', { recursive: true })
              .filter(f => f.endsWith('.conda') || f.endsWith('.tar.bz2'));
            
            const comment = `
            ### 📦 Packages Published to prefix.dev
            
            The following packages have been built and published:
            
            ${packages.map(p => `- \`${p}\``).join('\n')}
            
            Install with:
            \`\`\`bash
            pixi add -c https://prefix.dev/almost-conductor <package-name>
            \`\`\`
            `;
            
            // This would need the PR number to post, which requires parsing commit message
            console.log(comment);
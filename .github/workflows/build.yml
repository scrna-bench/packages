name: Build and Publish Recipes

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      recipe:
        description: 'Specific recipe to build (leave empty for all changed)'
        required: false
        type: string

env:
  RATTLER_BUILD_VERSION: "0.16.0"

jobs:
  detect-changes:
    name: Detect Changed Recipes
    runs-on: ubuntu-latest
    outputs:
      recipes: ${{ steps.get-recipes.outputs.recipes }}
      matrix: ${{ steps.get-recipes.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed recipes
        id: get-recipes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.recipe }}" ]; then
            # Manual trigger with specific recipe
            RECIPES='["${{ inputs.recipe }}"]'
            echo "Building manually triggered recipe: ${{ inputs.recipe }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR - detect changed recipes
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^recipes/' || true)
            if [ -z "$CHANGED_FILES" ]; then
              echo "No recipe changes detected in PR"
              RECIPES='[]'
            else
              RECIPES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          else
            # Push to main - detect changed recipes
            # Check if this is an initial commit or if before SHA is valid
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || \
               [ -z "${{ github.event.before }}" ]; then
              echo "Initial push or invalid before SHA - building all recipes"
              RECIPES=$(find recipes -mindepth 1 -maxdepth 1 -type d ! -name "_*" -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^recipes/' || true)
              if [ -z "$CHANGED_FILES" ]; then
                echo "No recipe changes detected - building all recipes"
                RECIPES=$(find recipes -mindepth 1 -maxdepth 1 -type d ! -name "_*" -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
              else
                RECIPES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
              fi
            fi
          fi
          
          echo "recipes=$RECIPES" >> $GITHUB_OUTPUT
          echo "matrix={\"recipe\":$RECIPES}" >> $GITHUB_OUTPUT
          echo "Detected recipes: $RECIPES"

  build:
    name: Build ${{ matrix.recipe }} (${{ matrix.platform.target }})
    needs: detect-changes
    if: needs.detect-changes.outputs.recipes != '[]'
    strategy:
      fail-fast: false
      matrix: 
        recipe: ${{ fromJson(needs.detect-changes.outputs.recipes) }}
        platform:
          - os: ubuntu-latest
            target: linux-64
          - os: macos-latest
            target: osx-64
          - os: macos-14  # M1/M2
            target: osx-arm64
          - os: windows-latest
            target: win-64
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        shell: bash
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Verify recipe exists
        shell: bash
        run: |
          if [ ! -f "recipes/${{ matrix.recipe }}/recipe.yaml" ]; then
            echo "Error: Recipe file not found at recipes/${{ matrix.recipe }}/recipe.yaml"
            exit 1
          fi
          echo "Found recipe at recipes/${{ matrix.recipe }}/recipe.yaml"

      - name: Check if recipe is noarch
        id: check-noarch
        shell: bash
        run: |
          if grep -q "noarch: generic" recipes/${{ matrix.recipe }}/recipe.yaml || \
             grep -q "noarch: python" recipes/${{ matrix.recipe }}/recipe.yaml; then
            echo "is_noarch=true" >> $GITHUB_OUTPUT
            echo "Recipe is noarch - will only build on linux-64"
          else
            echo "is_noarch=false" >> $GITHUB_OUTPUT
            echo "Recipe is platform-specific - building for ${{ matrix.platform.target }}"
          fi

      - name: Build recipe
        if: steps.check-noarch.outputs.is_noarch == 'false' || matrix.platform.target == 'linux-64'
        shell: bash
        run: |
          cd recipes/${{ matrix.recipe }}
          rattler-build build --recipe recipe.yaml --output-dir ../../output --target-platform ${{ matrix.platform.target }}
        env:
          CONDA_BLD_PATH: ${{ github.workspace }}/output

      - name: List built packages
        if: steps.check-noarch.outputs.is_noarch == 'false' || matrix.platform.target == 'linux-64'
        shell: bash
        run: |
          echo "Built packages:"
          ls -lh output/
          
      - name: Verify package built
        if: steps.check-noarch.outputs.is_noarch == 'false' || matrix.platform.target == 'linux-64'
        shell: bash
        run: |
          # Verify the package was created
          PACKAGE_FILE=$(find output -name "*.conda" 2>/dev/null | head -n 1)
          if [ -z "$PACKAGE_FILE" ]; then
            PACKAGE_FILE=$(find output -name "*.tar.bz2" 2>/dev/null | head -n 1)
          fi
          
          if [ -z "$PACKAGE_FILE" ]; then
            echo "Error: No package file found"
            exit 1
          fi
          
          echo "✅ Package built successfully: $PACKAGE_FILE"
          ls -lh "$PACKAGE_FILE"

      - name: Upload build artifacts
        if: steps.check-noarch.outputs.is_noarch == 'false' || matrix.platform.target == 'linux-64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.recipe }}-${{ matrix.platform.target }}-packages
          path: output/
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Publish to prefix.dev
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.5.0
        with:
          pixi-version: latest
          run-install: false

      - name: Install rattler-build
        shell: bash
        run: |
          pixi global install rattler-build==${{ env.RATTLER_BUILD_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        shell: bash
        run: |
          echo "Downloaded artifacts:"
          find artifacts/ -type f -name "*.conda" -o -name "*.tar.bz2"

      - name: Get OIDC token
        id: oidc-token
        shell: bash
        run: |
          echo "Requesting OIDC token from GitHub Actions..."
          echo "Audience: prefix.dev"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Ref: ${{ github.ref }}"
          
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=prefix.dev" | jq -r '.value')
          
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "❌ Failed to get OIDC token"
            exit 1
          fi
          
          echo "✅ OIDC token acquired successfully"
          echo "Token length: ${#OIDC_TOKEN}"
          
          # Decode token header and payload for debugging (without signature)
          echo "Token claims:"
          echo "$OIDC_TOKEN" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq . || echo "Could not decode token"
          
          echo "token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

      - name: Upload to prefix.dev
        shell: bash
        env:
          OIDC_TOKEN: ${{ steps.oidc-token.outputs.token }}
        run: |
          echo "Uploading with OIDC authentication via API..."
          echo "Token is set: $([ -n "$OIDC_TOKEN" ] && echo 'yes' || echo 'no')"
          echo "Channel: almost-conductor"
          
          # Find all package files
          PACKAGES=$(find artifacts/ -type f \( -name "*.conda" -o -name "*.tar.bz2" \))
          
          if [ -z "$PACKAGES" ]; then
            echo "No packages found to upload"
            exit 1
          fi
          
          echo "Uploading packages to prefix.dev channel: almost-conductor"
          for PACKAGE in $PACKAGES; do
            echo "Uploading: $PACKAGE"
            PACKAGE_NAME=$(basename "$PACKAGE")
            
            # Upload using prefix.dev API with OIDC token
            HTTP_CODE=$(curl -w "%{http_code}" -o response.txt \
              -X POST \
              -H "Authorization: Bearer $OIDC_TOKEN" \
              -F "package=@$PACKAGE" \
              "https://prefix.dev/api/v1/upload/almost-conductor")
            
            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "✅ Successfully uploaded: $PACKAGE_NAME"
            else
              echo "❌ Failed to upload: $PACKAGE_NAME (HTTP $HTTP_CODE)"
              cat response.txt
              exit 1
            fi
          done
          
          echo "✅ All packages uploaded successfully!"

      - name: Comment on PR (if from PR)
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'Merge pull request')
        uses: actions/github-script@v7
        with:
          script: |
            const packages = require('fs').readdirSync('artifacts/', { recursive: true })
              .filter(f => f.endsWith('.conda') || f.endsWith('.tar.bz2'));
            
            const comment = `
            ### 📦 Packages Published to prefix.dev
            
            The following packages have been built and published:
            
            ${packages.map(p => `- \`${p}\``).join('\n')}
            
            Install with:
            \`\`\`bash
            pixi add -c https://prefix.dev/almost-conductor <package-name>
            \`\`\`
            `;
            
            // This would need the PR number to post, which requires parsing commit message
            console.log(comment);
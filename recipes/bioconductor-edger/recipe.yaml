context:
  name: bioconductor-edger
  version: "4.8.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://bioconductor.org/packages/3.22/bioc/src/contrib/edgeR_${{ version }}.tar.gz
  sha256: dc1451f32fc5793001b14e0cae1b0fafcadc3b7081637f2f8e8dba5ee4760da4

build:
  number: 0
  script:
    - R CMD INSTALL --build .

requirements:
  host:
    - bioconductor-limma >=3.66.0,<3.67.0
    - r-base >= 4.5.0
    - r-locfit
  run:
    - bioconductor-limma >=3.66.0,<3.67.0
    - r-base >= 4.5.0
    - r-locfit

tests:
  - script:
    - Rscript -e "library('edgeR')"
  - script:
    - Rscript -e "library('edgeR'); packageVersion('edgeR')"

about:
  homepage: https://bioconductor.org/packages/release/bioc/html/edgeR.html
  summary: Bioconductor edgeR package
  description: |
    Differential expression analysis of sequence count data. Implements a 
    range of statistical methodology based on the negative binomial distributions, 
    including empirical Bayes estimation, exact tests, generalized linear models, 
    quasi-likelihood, and gene set enrichment. Can perform differential analyses 
    of any type of omics data that produces read counts, including RNA-seq, 
    ChIP-seq, ATAC-seq, Bisulfite-seq, SAGE, CAGE, metabolomics, or proteomics 
    spectral counts. RNA-seq analyses can be conducted at the gene or isoform 
    level, and tests can be conducted for differential exon or transcript usage.
  license: GPL-3.0-only
  repository: https://code.bioconductor.org/browse/edgeR/
  documentation: https://bioconductor.org/packages/release/bioc/html/edgeR.html

extra:
  recipe-maintainers:
    - markrobinsonuzh
  bioconductor:
    package: edgeR
    version: 3.22

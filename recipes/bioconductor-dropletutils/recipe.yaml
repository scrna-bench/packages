context:
  name: bioconductor-dropletutils
  version: "1.30.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://bioconductor.org/packages/3.22/bioc/src/contrib/DropletUtils_${{ version }}.tar.gz
  sha256: 4581efa64fc6f0c1c175068f83e1583a640e2e2b26e000a6574e4c9f3e9562a2

build:
  number: 0
  script:
    - R CMD INSTALL --build .

requirements:
  host:
    - bioconductor-biocgenerics >=0.56.0,<0.57.0
    - bioconductor-beachmat >=2.26.0,<2.27.0
    - bioconductor-biocparallel >=1.44.0,<1.45.0
    - bioconductor-delayedarray >=0.36.0,<0.37.0
    - bioconductor-delayedmatrixstats >=1.32.0,<1.33.0
    - bioconductor-edger >=4.8.0,<4.9.0
    - bioconductor-genomicranges >=1.62.0,<1.63.0
    - bioconductor-hdf5array >=1.38.0,<1.39.0
    - bioconductor-iranges >=2.44.0,<2.45.0
    - bioconductor-rhdf5 >=2.54.0,<2.55.0
    - bioconductor-rhdf5lib >=1.32.0,<1.33.0
    - bioconductor-s4vectors >=0.48.0,<0.49.0
    - bioconductor-scuttle >=1.20.0,<1.21.0
    - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
    - bioconductor-sparsearray >=1.10.0,<1.11.0
    - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
    - r-base >= 4.5.0
    - r-bh
    - r-dqrng
    - r-matrix
    - r-r.utils
    - r-rcpp
    - libblas
    - liblapack
    - zlib
  run:
    - bioconductor-biocgenerics >=0.56.0,<0.57.0
    - bioconductor-beachmat >=2.26.0,<2.27.0
    - bioconductor-biocparallel >=1.44.0,<1.45.0
    - bioconductor-delayedarray >=0.36.0,<0.37.0
    - bioconductor-delayedmatrixstats >=1.32.0,<1.33.0
    - bioconductor-edger >=4.8.0,<4.9.0
    - bioconductor-genomicranges >=1.62.0,<1.63.0
    - bioconductor-hdf5array >=1.38.0,<1.39.0
    - bioconductor-iranges >=2.44.0,<2.45.0
    - bioconductor-rhdf5 >=2.54.0,<2.55.0
    - bioconductor-rhdf5lib >=1.32.0,<1.33.0
    - bioconductor-s4vectors >=0.48.0,<0.49.0
    - bioconductor-scuttle >=1.20.0,<1.21.0
    - bioconductor-singlecellexperiment >=1.32.0,<1.33.0
    - bioconductor-sparsearray >=1.10.0,<1.11.0
    - bioconductor-summarizedexperiment >=1.40.0,<1.41.0
    - r-base >= 4.5.0
    - r-bh
    - r-dqrng
    - r-matrix
    - r-r.utils
    - r-rcpp
    - libblas
    - liblapack
    - zlib

tests:
  - script:
    - Rscript -e "library('DropletUtils')"
  - script:
    - Rscript -e "library('DropletUtils'); packageVersion('DropletUtils')"

about:
  homepage: https://bioconductor.org/packages/release/bioc/html/DropletUtils.html
  summary: DropletUtils Bioconductor package
  description: |
    SingleCellExperiment and Seurat objects.
    Provides a number of utility functions for handling single-cell (RNA-seq) data 
    from droplet technologies such as 10X Genomics. This includes data loading 
    from count matrices or molecule information files, identification of cells 
    from empty droplets, removal of barcode-swapped pseudo-cells, and downsampling 
    of the count matrix.
  license: GPL-3.0-only
  repository: https://bioconductor.org/packages/DropletUtils/
  documentation: https://bioconductor.org/packages/release/bioc/html/DropletUtils.html

extra:
  recipe-maintainers:
    - markrobinsonuzh
  bioconductor:
    package: DropletUtils
    version: 3.22

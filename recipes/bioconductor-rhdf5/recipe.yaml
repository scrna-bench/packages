context:
  name: bioconductor-rhdf5
  version: "2.54.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://bioconductor.org/packages/3.22/bioc/src/contrib/rhdf5_${{ version }}.tar.gz
  sha256: 65e273b1ebbce4cc0a1e6baa86e1a699b95d726c5439c313094a3eb50d4037af

build:
  number: 0
  skip:
    - win
  script:
    - R CMD INSTALL --build .

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - make
  host:
    - r-base >=4.0.0
    - bioconductor-rhdf5lib >=1.13.4
    - bioconductor-rhdf5filters >=1.15.5
    - zlib
  run:
    - r-base >=4.0.0
    - bioconductor-rhdf5lib >=1.13.4
    - bioconductor-rhdf5filters >=1.15.5

tests:
  - script:
    - Rscript -e "library('rhdf5')"
  - script:
    - Rscript -e "library('rhdf5'); packageVersion('rhdf5')"

about:
  homepage: https://github.com/Huber-group-EMBL/rhdf5
  summary: R Interface to HDF5
  description: |
    This package provides an interface between HDF5 and R. HDF5's main
    features are the ability to store and access very large and/or complex
    datasets and a wide variety of metadata on mass storage (disk) through
    a completely portable file format.
  license: Artistic-2.0
  repository: https://github.com/Huber-group-EMBL/rhdf5
  documentation: https://bioconductor.org/packages/release/bioc/html/rhdf5.html

extra:
  recipe-maintainers:
    - btraven00
  bioconductor:
    package: rhdf5
    version: 3.22

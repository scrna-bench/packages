context:
  name: bioconductor-rigraphlib
  version: "1.2.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://bioconductor.org/packages/3.22/bioc/src/contrib/Rigraphlib_${{ version }}.tar.gz
  sha256: a4291fb8e03b16f08130ca74fc9e0d00b9bd90196b48c084202324cfe51310a4


build:
  number: 0
  skip:
    - win
  script:
    - R CMD INSTALL --build .


requirements:
  host:
    - r-base >=4.5.0
    - bioconductor-biocmake >=1.2.0, 1.3.0
    - bioconductor-dir.expiry >=1.18.0, <1.19.0
  run:
    - r-base >=4.5.0
    - bioconductor-biocmake >=1.2.0, 1.3.0
    - bioconductor-dir.expiry >=1.18.0, <1.19.0

tests:
  - script:
    - Rscript -e "library('Rigraphlib')"
  - script:
    - Rscript -e "library('Rigraphlib'); packageVersion('Rigraphlib')"

about:
  homepage: https://www.bioconductor.org/packages/release/bioc/html/Rigraphlib.html
  summary: igraph library as an R package
  description: |
    Vendors the igraph C source code and builds it into a static library. Other 
    Bioconductor packages can link to libigraph.a in their own C/C++ code. This 
    is intended for packages wrapping C/C++ libraries that depend on the igraph 
    C library and cannot be easily adapted to use the igraph R package.
  license: MIT
  repository: https://github.com/libscran/Rigraphlib
  documentation: https://www.bioconductor.org/packages/release/bioc/html/Rigraphlib.html

extra:
  recipe-maintainers:
    - markrobinsonuzh
  bioconductor:
    package: Rigraphlib
    version: 3.22

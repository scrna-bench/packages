context:
  name: bioconductor-sparsearray
  version: "1.10.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://bioconductor.org/packages/3.22/bioc/src/contrib/SparseArray_${{ version }}.tar.gz
  sha256: 7c516c3e2f9dab11c10c6e75caf2254463c5792b711035ca3cf8475e946b81a5

build:
  number: 0
  script:
    - R CMD INSTALL --build .

requirements:
  host:
    - r-base >=4.5.0
    - r-matrix
    - r-matrixstats
    - bioconductor-iranges >=2.44.0,<2.45.0
    - bioconductor-xvector >=0.50.0,<0.51.0
    - bioconductor-biocgenerics >=0.56.0,<0.57.0
    - bioconductor-matrixgenerics >= 1.22.0,<1.23.0
    - bioconductor-s4vectors >= 0.48.0,<0.49.0
    - bioconductor-s4arrays >= 1.10.0,<1.11.0
  run:
    - r-base >=4.5.0
    - r-matrix
    - r-matrixstats
    - bioconductor-iranges >=2.44.0,<2.45.0
    - bioconductor-xvector >=0.50.0,<0.51.0
    - bioconductor-biocgenerics >=0.56.0,<0.57.0
    - bioconductor-matrixgenerics >= 1.22.0,<1.23.0
    - bioconductor-s4vectors >= 0.48.0,<0.49.0
    - bioconductor-s4arrays >= 1.10.0,<1.11.0

tests:
  - script:
    - Rscript -e "library('SparseArray')"
  - script:
    - Rscript -e "library('SparseArray'); packageVersion('SparseArray')"

about:
  homepage: https://github.com/Bioconductor/SparseArray
  summary: High-performance sparse data representation and manipulation in R
  description: |
    The SparseArray package provides array-like containers for efficient in-memory 
    representation of multidimensional sparse data in R (arrays and matrices). The 
    package defines the SparseArray virtual class and two concrete subclasses: 
    COO_SparseArray and SVT_SparseArray. Each subclass uses its own internal 
    representation of the nonzero multidimensional data: the "COO layout" and the 
    "SVT layout", respectively. SVT_SparseArray objects mimic as much as possible 
    the behavior of ordinary matrix and array objects in base R. In particular, 
    they suppport most of the "standard matrix and array API" defined in base R 
    and in the matrixStats package from CRAN.
  license: Artistic-2.0
  repository: https://github.com/Bioconductor/SparseArray
  documentation: https://bioconductor.github.io/SparseArray/

extra:
  recipe-maintainers:
    - markrobinsonuzh
  bioconductor:
    package: SparseArray
    version: 3.22
